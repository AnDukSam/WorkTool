<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>저울 단축키 지정 전문 도구</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f8f9fa;
        }

        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; }

        .top-area { display: flex; gap: 20px; margin-bottom: 10px; min-height: 180px; }
        .input-box { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .settings-box {
            flex: 1; border: 2px dashed #ccc; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            background: #fff; position: relative; padding: 10px;
        }

        textarea { width: 100%; flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 12px; font-size: 14px; box-sizing: border-box; resize: none; }

        /* 정렬 옵션 중앙 정렬 수정 */
        .sort-options { display: flex; gap: 20px; justify-content: center; font-size: 14px; font-weight: bold; color: #555; margin-bottom: 5px; }
        .sort-options label { cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .control-panel { display: flex; align-items: center; gap: 20px; text-align: center; }
        .color-section { display: flex; flex-direction: column; gap: 8px; align-items: center; min-width: 90px; }
        .arrow-group { display: flex; gap: 5px; }

        .arrow-btn {
            background: #f0f0f0; border: 1px solid #ddd; border-radius: 6px; width: 35px; height: 35px;
            cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.1s;
        }
        .arrow-btn:active { background: #e0e0e0; transform: scale(0.9); }
        .section-label { font-size: 12px; color: #333; font-weight: bold; margin-top: 2px; }

        .preview-item, .grid-item {
            width: 90px; height: 90px; border-radius: 10px; border: 1px solid #dee2e6;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #fff; text-align: center; box-sizing: border-box;
            overflow: hidden; padding: 5px;
        }

        .preview-item .item-text { font-size: 16px; font-weight: 800; line-height: 1.2; word-break: break-all; }
        .grid-item .item-text { font-size: 12px; font-weight: 800; line-height: 1.2; word-break: break-all; margin-bottom: 2px; }
        .grid-item .item-num { font-size: 10px; font-weight: normal; opacity: 0.8; }

        .grid-container { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; background-color: #e9ecef; padding: 10px; border-radius: 15px; margin-top: 10px; }
        .grid-item { aspect-ratio: 1/1; width: auto; height: auto; cursor: pointer; transition: 0.1s; }
        .grid-item.special { background: #555 !important; border: none; cursor: default; color: #fff !important; }

        #menuModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: flex-end; }
        .modal-content { background: #fff; width: 100%; max-width: 500px; max-height: 70vh; border-top-left-radius: 25px; border-top-right-radius: 25px; overflow-y: auto; padding: 25px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        .menu-item { padding: 15px; border-bottom: 1px solid #f1f3f5; display: flex; justify-content: space-between; cursor: pointer; font-size: 16px; }

        @media (max-width: 600px) {
            .top-area { flex-direction: column; }
            .grid-container { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>

<div id="menuModal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="modalList"></div>
    </div>
</div>

<script>
    const bgColors = ["#ffffff", "#cccccc", "#48d3fe", "#39b7fb", "#2a9df8", "#b3e2c5", "#ffcccc", "#ff99cc", "#cc99cc"];
    const textColors = ["#000000", "#ff0000", "#00ff00", "#0000ff", "#ffff00", "#00ffff", "#ff00ff", "#ffffff", "#cccccc"];

    const settingsBox = document.getElementById('settingsBox');
    const gridContainer = document.getElementById('shortcutGrid');
    const modalList = document.getElementById('modalList');

    let activeCell = null;

    for (let i = 1; i <= 72; i++) {
        const item = document.createElement('div');
        item.className = 'grid-item';
        item.dataset.bgIdx = "0";
        item.dataset.textIdx = "0";

        if (i >= 71) {
            item.classList.add('special');
            item.innerHTML = `<span class="item-text">${i === 71 ? '개체호출' : '개체편집'}</span>`;
        } else {
            item.innerHTML = `<span class="item-text"></span><span class="item-num"></span>`;
            item.onclick = () => handleCellClick(item);
        }
        gridContainer.appendChild(item);
    }

    function handleCellClick(cell) {
        openModal(cell);
        loadSettings(cell);
    }

    function openModal(cell) {
        activeCell = cell;
        const rawData = document.getElementById('dataInput').value.trim();
        if (!rawData) return alert("데이터를 먼저 입력하세요.");

        const sortType = document.querySelector('input[name="sortOrder"]:checked').value;

        const items = rawData.split('\n').map(line => {
            const p = line.split(/\t| {2,}/);
            if (p.length >= 2) {
                return {
                    n: p[1].trim(),
                    id: parseInt(p[0].trim()),
                    rawId: p[0].trim()
                };
            }
            return null;
        }).filter(x => x);

        if (sortType === 'num') {
            items.sort((a, b) => a.id - b.id);
        } else {
            items.sort((a, b) => a.n.localeCompare(b.n, 'ko'));
        }

        modalList.innerHTML = '';
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'menu-item';
            div.innerHTML = `<span>${item.n}</span><span style="font-size:12px; color:#999;">(${item.rawId})</span>`;
            div.onclick = () => {
                cell.querySelector('.item-text').textContent = item.n;
                cell.querySelector('.item-num').textContent = item.rawId;

                const previewText = document.querySelector('#preview .item-text');
                if (previewText) previewText.textContent = item.n;

                document.getElementById('menuModal').style.display = 'none';
            };
            modalList.appendChild(div);
        });
        document.getElementById('menuModal').style.display = 'flex';
    }

    function loadSettings(cell) {
        activeCell = cell;
        const bgIdx = parseInt(cell.dataset.bgIdx);
        const textIdx = parseInt(cell.dataset.textIdx);
        // '상품 미지정' 글자 제거 수정
        const name = cell.querySelector('.item-text').textContent || "";
        updateSettingsUI(name, bgIdx, textIdx);
    }

    function updateSettingsUI(name, bgIdx, textIdx) {
        settingsBox.innerHTML = `
            <div class="control-panel">
                <div class="color-section">
                    <div class="arrow-group">
                        <button class="arrow-btn" onclick="updateBg(-1)">◀</button>
                        <button class="arrow-btn" onclick="updateBg(1)">▶</button>
                    </div>
                    <span class="section-label" id="bgLabel">배경색(${bgIdx + 1})</span>
                </div>
                <div class="preview-item" id="preview" style="background-color: ${bgColors[bgIdx]}">
                    <span class="item-text" style="color: ${textColors[textIdx]}">${name}</span>
                </div>
                <div class="color-section">
                    <div class="arrow-group">
                        <button class="arrow-btn" onclick="updateText(-1)">◀</button>
                        <button class="arrow-btn" onclick="updateText(1)">▶</button>
                    </div>
                    <span class="section-label" id="textLabel">글자색(${textIdx + 1})</span>
                </div>
            </div>
        `;
    }

    function updateBg(dir) {
        if (!activeCell) return;
        let idx = (parseInt(activeCell.dataset.bgIdx) + dir + bgColors.length) % bgColors.length;
        activeCell.dataset.bgIdx = idx;
        const color = bgColors[idx];
        const preview = document.getElementById('preview');
        if (preview) preview.style.backgroundColor = color;
        document.getElementById('bgLabel').textContent = `배경색(${idx + 1})`;
        activeCell.style.backgroundColor = color;
    }

    function updateText(dir) {
        if (!activeCell) return;
        let idx = (parseInt(activeCell.dataset.textIdx) + dir + textColors.length) % textColors.length;
        activeCell.dataset.textIdx = idx;
        const color = textColors[idx];
        const previewText = document.querySelector('#preview .item-text');
        if (previewText) previewText.style.color = color;
        document.getElementById('textLabel').textContent = `글자색(${idx + 1})`;
        activeCell.querySelector('.item-text').style.color = color;
        activeCell.querySelector('.item-num').style.color = color;
    }
</script>
