<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>저울 단축키 지정</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f8f9fa;
            --grid-item-bg: #ffffff;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 800px; }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px; /* 모바일에서 자동 줌 방지를 위해 16px 이상 권장 */
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        /* 반응형 그리드 시스템 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(8, 1fr); /* 기본 8열 */
            gap: 6px;
            background-color: #e9ecef;
            padding: 8px;
            border-radius: 12px;
        }

        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: repeat(4, 1fr); /* 모바일에서는 4열로 변경 */
            }
        }

        .grid-item {
            aspect-ratio: 1 / 1;
            background-color: var(--grid-item-bg);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 1px solid #dee2e6;
            -webkit-tap-highlight-color: transparent; /* 터치 시 파란 박스 제거 */
        }

        .grid-item .item-text { font-size: 11px; font-weight: bold; text-align: center; color: #333; padding: 2px; }
        .grid-item .item-num { font-size: 9px; color: var(--primary-color); margin-top: 2px; }

        /* 모바일용 전체화면 모달 */
        #menuModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            justify-content: center;
            align-items: flex-end; /* 아래에서 올라오는 느낌 */
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 500px;
            max-height: 70vh;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            overflow-y: auto;
            padding: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        }

        .modal-header {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .menu-item {
            padding: 15px;
            border-bottom: 1px solid #f1f3f5;
            display: flex;
            justify-content: space-between;
            font-size: 16px;
        }

        .menu-item:active { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <textarea id="dataInput" placeholder="[번호][탭][상품명] 입력..."></textarea>
    <div class="grid-container" id="shortcutGrid"></div>
</div>

<div id="menuModal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            상품 선택
            <span onclick="closeModal()" style="cursor:pointer; color:#999;">✕</span>
        </div>
        <div id="modalList"></div>
    </div>
</div>

<script>
    const dataInput = document.getElementById('dataInput');
    const gridContainer = document.getElementById('shortcutGrid');
    const menuModal = document.getElementById('menuModal');
    const modalList = document.getElementById('modalList');
    let targetCell = null;

    // 8x9 그리드 생성 (총 72개)
    for (let i = 0; i < 72; i++) {
        const item = document.createElement('div');
        item.className = 'grid-item';
        item.innerHTML = `<span class="item-text"></span><span class="item-num"></span>`;
        item.onclick = () => openModal(item);
        gridContainer.appendChild(item);
    }

    function openModal(cell) {
        targetCell = cell;
        const rawData = dataInput.value.trim();
        if (!rawData) return alert("데이터를 먼저 입력하세요.");

        const lines = rawData.split('\n');
        let itemList = lines.map(line => {
            const parts = line.split('\t');
            return parts.length >= 2 ? { num: parts[0].trim(), name: parts[1].trim() } : null;
        }).filter(item => item !== null);

        // 상품명 가나다순 정렬
        itemList.sort((a, b) => a.name.localeCompare(b.name, 'ko'));

        modalList.innerHTML = '';
        itemList.forEach(item => {
            const div = document.createElement('div');
            div.className = 'menu-item';
            div.innerHTML = `<span>${item.name}</span><span style="color:#4a90e2">(${item.num})</span>`;
            div.onclick = () => {
                cell.querySelector('.item-text').textContent = item.name;
                cell.querySelector('.item-num').textContent = item.num;
                closeModal();
            };
            modalList.appendChild(div);
        });

        menuModal.style.display = 'flex';
        document.body.style.overflow = 'hidden'; // 배경 스크롤 방지
    }

    function closeModal() {
        menuModal.style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
