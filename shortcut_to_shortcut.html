<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>저울 단축키 지정</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f8f9fa;
        }

        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; }

        .top-area { display: flex; gap: 20px; margin-bottom: 15px; height: 180px; }
        .input-box { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .settings-box {
            flex: 1; border: 2px dashed #ccc; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            background: #fff; position: relative; padding: 10px;
        }

        textarea { width: 100%; flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 12px; font-size: 14px; box-sizing: border-box; resize: none; }
        .sort-options { display: flex; gap: 15px; justify-content: center; font-size: 13px; font-weight: bold; color: #666; }

        /* 상품 바구니 영역 (그리드와 디자인 통일) */
        .item-pool-container {
            width: 100%;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #dee2e6;
            margin-bottom: 15px;
            padding: 10px;
            box-sizing: border-box;
            user-select: none; /* 드래그 스크롤 시 텍스트 선택 방지 */
        }
        .item-pool-title { font-size: 12px; font-weight: bold; color: #888; margin-bottom: 8px; }

        .item-pool {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 5px;
            cursor: grab;
            scrollbar-width: none; /* 스크롤바 숨기기 (선택사항) */
        }
        .item-pool::-webkit-scrollbar { display: none; }
        .item-pool:active { cursor: grabbing; }

        .pool-item {
            flex: 0 0 auto;
            width: 85px; height: 85px; /* 하단 그리드와 크기 통일 */
            background: #f8f9fa;
            border: 1px solid #ced4da;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: 800;
            text-align: center;
            line-height: 1.2;
            word-break: break-all;
            padding: 5px;
            box-sizing: border-box;
        }

        /* 하단 그리드 */
        .grid-container { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; background-color: #e9ecef; padding: 10px; border-radius: 15px; }
        .grid-item { aspect-ratio: 1/1; background: #fff; border-radius: 8px; border: 1px solid #dee2e6; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.1s; position: relative; overflow: hidden; }
        .grid-item.drag-over { background-color: #e3f2fd !important; border: 2px solid var(--primary-color); }
        .grid-item .item-text { font-size: 12px; font-weight: 800; line-height: 1.2; text-align: center; pointer-events: none; }
        .grid-item .item-num { font-size: 10px; opacity: 0.7; pointer-events: none; }
        .grid-item.special { background: #555 !important; color: #fff !important; cursor: default; }

        /* 컨트롤 영역 */
        .control-panel { display: flex; align-items: center; gap: 15px; }
        .arrow-btn { background: #f0f0f0; border: 1px solid #ddd; border-radius: 6px; width: 32px; height: 32px; cursor: pointer; }
        .preview-item { width: 85px; height: 85px; border-radius: 10px; border: 1px solid #dee2e6; display: flex; justify-content: center; align-items: center; background: #fff; text-align: center; padding: 5px; font-size: 15px; font-weight: 800; }

        #menuModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: flex-end; }
        .modal-content { background: #fff; width: 100%; max-width: 500px; max-height: 70vh; border-top-left-radius: 25px; border-top-right-radius: 25px; overflow-y: auto; padding: 25px; }
        .menu-item { padding: 15px; border-bottom: 1px solid #f1f3f5; display: flex; justify-content: space-between; cursor: pointer; }

        @media (max-width: 600px) {
            .top-area { flex-direction: column; height: auto; }
            .grid-container { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-area">
        <div class="input-box">
            <textarea id="dataInput" oninput="refreshItemPool()">1  LA갈비
2   갈비살(미국산)
3   곰탕용 고기
... (중략) ...
400 예약 상품</textarea>
            <div class="sort-options">
                <label><input type="radio" name="sortOrder" value="num" checked onchange="refreshItemPool()"> 품번순</label>
                <label><input type="radio" name="sortOrder" value="name" onchange="refreshItemPool()"> 상품명순</label>
            </div>
        </div>
        <div class="settings-box" id="settingsBox">
            <div style="color:#999; font-size:13px;">버튼을 클릭하여 설정</div>
        </div>
    </div>

    <div class="item-pool-container">
        <div class="item-pool-title">상품 바구니 (좌우 드래그 스크롤 / 항목을 그리드로 드래그)</div>
        <div class="item-pool" id="itemPool"></div>
    </div>

    <div class="grid-container" id="shortcutGrid"></div>
</div>

<div id="menuModal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()"><div id="modalList"></div></div>
</div>

<script>
    const bgColors = ["#ffffff", "#cccccc", "#48d3fe", "#39b7fb", "#2a9df8", "#b3e2c5", "#ffcccc", "#ff99cc", "#cc99cc"];
    const textColors = ["#000000", "#ff0000", "#00ff00", "#0000ff", "#ffff00", "#00ffff", "#ff00ff", "#ffffff", "#cccccc"];

    let activeCell = null;
    let draggedData = null;

    // 그리드 생성
    const gridContainer = document.getElementById('shortcutGrid');
    for (let i = 1; i <= 72; i++) {
        const item = document.createElement('div');
        item.className = 'grid-item';
        item.dataset.bgIdx = "0";
        item.dataset.textIdx = "0";

        if (i >= 71) {
            item.classList.add('special');
            item.innerHTML = `<span class="item-text">${i === 71 ? '개체호출' : '개체편집'}</span>`;
        } else {
            item.innerHTML = `<span class="item-text"></span><span class="item-num"></span>`;
            item.draggable = true;
            item.onclick = () => handleCellClick(item);
            item.ondragstart = (e) => {
                const name = item.querySelector('.item-text').textContent;
                if(!name) { e.preventDefault(); return; }
                draggedData = { type: 'GRID', source: item };
            };
            item.ondragover = (e) => { e.preventDefault(); item.classList.add('drag-over'); };
            item.ondragleave = () => item.classList.remove('drag-over');
            item.ondrop = (e) => { e.preventDefault(); item.classList.remove('drag-over'); handleDrop(item); };
        }
        gridContainer.appendChild(item);
    }

    // 상품 바구니 갱신 및 드래그 스크롤 적용
    function refreshItemPool() {
        const pool = document.getElementById('itemPool');
        const rawData = document.getElementById('dataInput').value.trim();
        const sortType = document.querySelector('input[name="sortOrder"]:checked').value;

        const items = rawData.split('\n').map(line => {
            const p = line.split(/\t| {2,}/);
            return p.length >= 2 ? { n: p[1].trim(), id: p[0].trim(), sortId: parseInt(p[0]) } : null;
        }).filter(x => x);

        if (sortType === 'num') items.sort((a, b) => a.sortId - b.sortId);
        else items.sort((a, b) => a.n.localeCompare(b.n, 'ko'));

        pool.innerHTML = '';
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'pool-item';
            div.textContent = item.n;
            div.draggable = true;
            div.ondragstart = () => { draggedData = { type: 'POOL', name: item.n, id: item.id }; };
            pool.appendChild(div);
        });
    }

    // --- 드래그 스크롤 로직 ---
    const pool = document.getElementById('itemPool');
    let isDown = false;
    let startX;
    let scrollLeft;

    pool.addEventListener('mousedown', (e) => {
        isDown = true;
        startX = e.pageX - pool.offsetLeft;
        scrollLeft = pool.scrollLeft;
    });
    pool.addEventListener('mouseleave', () => { isDown = false; });
    pool.addEventListener('mouseup', () => { isDown = false; });
    pool.addEventListener('mousemove', (e) => {
        if (!isDown) return;
        e.preventDefault();
        const x = e.pageX - pool.offsetLeft;
        const walk = (x - startX) * 2; // 스크롤 속도
        pool.scrollLeft = scrollLeft - walk;
    });

    function handleDrop(target) {
        if (!draggedData) return;
        if (draggedData.type === 'POOL') {
            target.querySelector('.item-text').textContent = draggedData.name;
            target.querySelector('.item-num').textContent = draggedData.id;
        } else if (draggedData.type === 'GRID') {
            const source = draggedData.source;
            const temp = {
                name: target.querySelector('.item-text').textContent,
                num: target.querySelector('.item-num').textContent,
                bg: target.dataset.bgIdx, tx: target.dataset.textIdx,
                bgColor: target.style.backgroundColor, txColor: target.querySelector('.item-text').style.color
            };
            // 서로 교체 로직 생략(위와 동일)
            swapData(source, target, temp);
        }
        loadSettings(target);
        draggedData = null;
    }

    function swapData(s, t, temp) {
        // 데이터 교체 상세 구현 (생략된 이전 로직과 동일)
        t.querySelector('.item-text').textContent = s.querySelector('.item-text').textContent;
        t.querySelector('.item-num').textContent = s.querySelector('.item-num').textContent;
        t.dataset.bgIdx = s.dataset.bgIdx; t.dataset.textIdx = s.dataset.textIdx;
        t.style.backgroundColor = s.style.backgroundColor;
        t.querySelector('.item-text').style.color = s.querySelector('.item-text').style.color;

        s.querySelector('.item-text').textContent = temp.name;
        s.querySelector('.item-num').textContent = temp.num;
        s.dataset.bgIdx = temp.bg; s.dataset.textIdx = temp.tx;
        s.style.backgroundColor = temp.bgColor;
        s.querySelector('.item-text').style.color = temp.txColor;
    }

    // 초기화
    window.onload = refreshItemPool;
    function handleCellClick(cell) { openModal(cell); loadSettings(cell); }
    // (기존 openModal, loadSettings, updateBg, updateText 함수 유지)
</script>
</body>
</html>
