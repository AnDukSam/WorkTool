<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>저울 단축키 지정</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f8f9fa;
            --grid-item-bg: #ffffff;
            --special-bg: #555555;
            --special-text: #ffffff;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 800px; }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 15px;
            outline: none;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            background-color: #e9ecef;
            padding: 8px;
            border-radius: 12px;
        }

        @media (max-width: 600px) {
            .grid-container { grid-template-columns: repeat(4, 1fr); }
        }

        .grid-item {
            aspect-ratio: 1 / 1;
            background-color: var(--grid-item-bg);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 1px solid #dee2e6;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .grid-item .item-text { font-size: 11px; font-weight: bold; text-align: center; color: #333; padding: 2px; }
        .grid-item .item-num { font-size: 9px; color: var(--primary-color); margin-top: 2px; }

        /* 특수 버튼 스타일 (개체호출, 개체편집) */
        .grid-item.special {
            background-color: var(--special-bg);
            cursor: default; /* 클릭 불가 표시 */
            border: none;
        }
        .grid-item.special .item-text { color: var(--special-text); }

        /* 모달 스타일 */
        #menuModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            justify-content: center;
            align-items: flex-end;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 500px;
            max-height: 70vh;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            overflow-y: auto;
            padding: 20px;
        }

        .menu-item {
            padding: 15px;
            border-bottom: 1px solid #f1f3f5;
            display: flex;
            justify-content: space-between;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <textarea id="dataInput" placeholder="[번호][탭][상품명]을 입력하세요."></textarea>
    <div class="grid-container" id="shortcutGrid"></div>
</div>

<div id="menuModal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="modalList"></div>
    </div>
</div>

<script>
    const dataInput = document.getElementById('dataInput');
    const gridContainer = document.getElementById('shortcutGrid');
    const menuModal = document.getElementById('menuModal');
    const modalList = document.getElementById('modalList');
    let targetCell = null;

    const TOTAL_CELLS = 72; // 8x9

    for (let i = 1; i <= TOTAL_CELLS; i++) {
        const item = document.createElement('div');
        item.className = 'grid-item';

        // 맨 오른쪽에서 두 번째 (71번)와 맨 오른쪽 (72번) 처리
        if (i === TOTAL_CELLS - 1) {
            item.classList.add('special');
            item.innerHTML = `<span class="item-text">개체호출</span>`;
        } else if (i === TOTAL_CELLS) {
            item.classList.add('special');
            item.innerHTML = `<span class="item-text">개체편집</span>`;
        } else {
            item.innerHTML = `<span class="item-text"></span><span class="item-num"></span>`;
            item.onclick = () => openModal(item);
        }

        gridContainer.appendChild(item);
    }

    function openModal(cell) {
        targetCell = cell;
        const rawData = dataInput.value.trim();
        if (!rawData) return alert("데이터를 입력해주세요.");

        const lines = rawData.split('\n');
        let itemList = lines.map(line => {
            const parts = line.split('\t');
            return parts.length >= 2 ? { num: parts[0].trim(), name: parts[1].trim() } : null;
        }).filter(item => item !== null);

        itemList.sort((a, b) => a.name.localeCompare(b.name, 'ko'));

        modalList.innerHTML = '';
        itemList.forEach(item => {
            const div = document.createElement('div');
            div.className = 'menu-item';
            div.innerHTML = `<span>${item.name}</span><span style="color:#4a90e2">(${item.num})</span>`;
            div.onclick = () => {
                cell.querySelector('.item-text').textContent = item.name;
                cell.querySelector('.item-num').textContent = item.num;
                closeModal();
            };
            modalList.appendChild(div);
        });

        menuModal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        menuModal.style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
